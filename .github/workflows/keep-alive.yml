name: keep-alive-supabase

on:
  schedule:
    - cron: '0 12 * * 1,4'   # segundas e quintas, 12:00 UTC (09:00 BRT)
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sS -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail-with-body
          echo "ping enviado"
